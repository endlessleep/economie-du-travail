<body>

                <span class="icon">➔</span>
            </button>
        </div>

        <ul class="nav-links">
            <li><a href="index.html">Dashboard</a></li>
            <li class="has-submenu">
                <button class="submenu-btn" onclick="toggleAccordion(button)">
                    <span>Cours</span>
                    <span class="icon">▼</span>
                </button>
                <ul class="submenu-content" style="max-height: 500px;">
                    <li><a href="cours-2.html">2. Labour Demand</a></li>
                    <li><a href="cours-3.html">3. Equilibrium</a></li>
                    <li><a href="cours-4.html">4. Human Capital</a></li>

        </ul>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <header class="top-bar">
            <h1>5. Labour Supply Model</h1>
            <div class="user-profile">
                <span>Marie Nguyen</span>
            </div>
        </header>

        <div class="content-wrapper">
            <section class="lesson-section" id="section-container">
                <!-- Content will be added here step-by-step -->
                <div class="concept-card explanation" style="text-align: center; border: 2px dashed var(--clr-purple-border); padding: 4rem;">
                    <p style="font-size: 1.2rem; color: var(--clr-text-muted);">
                        Course 5 has been reset. Envoie-moi tes premières notes quand tu es prêt(e) à recommencer sur des bases plus claires !
                    </p>
                </div>
            </section>
        </div>
    </main>

    <!-- SCRIPTS -->
    <script>
        // Check for saved sidebar state
        document.addEventListener('DOMContentLoaded', () => {
            const sidebar = document.querySelector('.sidebar');
            if (localStorage.getItem('sidebarCollapsed') === 'true') {
                sidebar.classList.add('collapsed');
            }
        });

        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            sidebar.classList.toggle('collapsed');
            localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
        }

        function toggleAccordion(button) {
            const content = button.nextElementSibling;
            const icon = button.querySelector('.icon');
            if (content.style.maxHeight && content.style.maxHeight !== '0px') {
                content.style.maxHeight = '0px';
                icon.style.transform = "rotate(0deg)";
            } else {
                content.style.maxHeight = content.scrollHeight + 'px';
                icon.style.transform = "rotate(-180deg)";
            }
        }
    </script>
</body>

</html>
