<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Labour Economics - Labour Supply Model</title>
    <link rel="stylesheet" href="styles-blue.css">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;700;800&display=swap"
        rel="stylesheet">
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']]
            }
        };
    </script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        h1, h2 { font-family: 'Outfit', sans-serif; }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            💎 Labour Economics
            <button class="sidebar-toggle-btn" onclick="toggleSidebar()" aria-label="Close Sidebar">
                &times;
            </button>
        </div>

        <div class="accordion-item">
            <button class="accordion-header" onclick="toggleAccordion(this)">
                <span>📂 Lessons Menu</span>
                <span class="icon">▼</span>
            </button>
            <div class="accordion-content active" style="max-height: 500px;">
                <a href="index.html">1. Intro & Labour Market Status</a>
                <a href="cours-2.html">2. Dynamics & Equilibrium</a>
                <a href="cours-3.html">3. Microeconomics of Labour Demand</a>
                <a href="cours-4.html">4. Labour Market Frictions</a>
                <a href="cours-5.html" class="active">5. Labour Supply Model</a>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <header class="page-header" style="display: flex; align-items: center;">
            <button class="page-toggle-btn" id="page-toggle-btn" onclick="toggleSidebar()" aria-label="Open Sidebar"
                style="display: none;">
                &#9776;
            </button>
            <h1>Labour Supply: Neoclassical Model</h1>
        </header>

        <div class="content-scroll">
            <section class="lesson-section" id="incremental-content">
                <!-- Content will be added here step by step -->
                <p style="text-align: center; color: var(--clr-text-muted); margin-top: 5rem;">
                    Ready to build section by section...
                </p>
            </section>
        </div>
    </main>

    <script>
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const pageToggleBtn = document.getElementById('page-toggle-btn');
            sidebar.classList.toggle('collapsed');
            pageToggleBtn.style.display = sidebar.classList.contains('collapsed') ? 'block' : 'none';
        }

        function toggleAccordion(button) {
            const content = button.nextElementSibling;
            const icon = button.querySelector('.icon');
            if (content.style.maxHeight && content.style.maxHeight !== '0px') {
                content.style.maxHeight = '0px';
                icon.textContent = "▼";
            } else {
                content.style.maxHeight = content.scrollHeight + 'px';
                icon.textContent = "▲";
            }
        }
    </script>
</body>

</html>
