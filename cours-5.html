<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Labour Economics - Labour Supply Model</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Consolas&display=swap"
        rel="stylesheet">
    <!-- MathJax for LaTeX support -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']]
            }
        };
    </script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            🎓 Labour Economics
            <button class="sidebar-toggle-btn" onclick="toggleSidebar()" aria-label="Close Sidebar">
                &times;
            </button>
        </div>

        <div class="accordion-item">
            <button class="accordion-header" onclick="toggleAccordion(this)">
                <span>📂 Leçons</span>
                <span class="icon" style="transform: rotate(-180deg);">▼</span>
            </button>
            <div class="accordion-content active" style="max-height: 500px;">
                <a href="index.html">1. Intro & Labour Market Status</a>
                <a href="cours-2.html">2. Dynamics & Equilibrium</a>
                <a href="cours-3.html">3. The Microeconomics of Labour Demand</a>
                <a href="cours-4.html">4. Labour Market Frictions</a>
                <a href="cours-5.html" class="active">5. Labour Supply Model</a>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <!-- HEADER -->
        <header class="page-header" style="display: flex; align-items: center;">
            <button class="page-toggle-btn" id="page-toggle-btn" onclick="toggleSidebar()" aria-label="Open Sidebar"
                style="display: none;">
                &#9776;
            </button>
            <h1>5. Labour Supply Model</h1>
        </header>

        <!-- CONTENT AREA -->
        <div class="content-scroll">
            <section class="lesson-section" id="section-container">

                <div class="concept-card explanation" style="text-align: center; border: 2px dashed #CBD5E0; padding: 4rem; opacity: 0.7;">
                    <p style="font-size: 1.2rem; color: #4A5568;">
                        Le cours 5 a été réinitialisé. <br>
                        <strong>Prêt pour un nouveau départ ?</strong> Envoie-moi tes premières notes !
                    </p>
                </div>

            </section>
        </div>
    </main>

    <!-- SCRIPTS -->
    <script>
        // Check for saved sidebar state
        document.addEventListener('DOMContentLoaded', () => {
            const sidebar = document.querySelector('.sidebar');
            const pageToggleBtn = document.getElementById('page-toggle-btn');

            if (localStorage.getItem('sidebarCollapsed') === 'true') {
                sidebar.classList.add('collapsed');
                if (pageToggleBtn) pageToggleBtn.style.display = 'block';
            }
        });

        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const pageToggleBtn = document.getElementById('page-toggle-btn');

            sidebar.classList.toggle('collapsed');

            if (sidebar.classList.contains('collapsed')) {
                localStorage.setItem('sidebarCollapsed', 'true');
                if (pageToggleBtn) pageToggleBtn.style.display = 'block';
            } else {
                localStorage.setItem('sidebarCollapsed', 'false');
                if (pageToggleBtn) pageToggleBtn.style.display = 'none';
            }
        }

        function toggleAccordion(button) {
            const content = button.nextElementSibling;
            const icon = button.querySelector('.icon');
            if (content.style.maxHeight && content.style.maxHeight !== '0px') {
                content.style.maxHeight = '0px';
                icon.style.transform = "rotate(0deg)";
            } else {
                content.style.maxHeight = content.scrollHeight + 'px';
                icon.style.transform = "rotate(-180deg)";
            }
        }
    </script>
</body>

</html>
